#######################################################################################################################
#
# Timer Report Labeling Rules
#
# During report creation, custom labels can be assigned to Transaction, Action and Request timer reports (i.e. to the
# individual table entries in the "Transaction", "Action" and "Request" sections of the report). For example, all
# requests in the checkout area of a shopping app could be labeled with "checkout". These labels can be used for
# advanced analysis with XLT or other tools. They will be part of both, the HTML report and the XML data file.
#
# The automatic labeling of timer reports is controlled by "labeling rules". A rule describes how to select all timer
# reports of interest and how to process them.
#
# You may specify one or more rules as outlined below:
#
#   com.xceptance.xlt.reportgenerator.labelingRules.<num>.<param> = <value>
#
# The rules are sorted numerically based on <num> and are applied in ascending order.
#
# The supported values for "<param>" are:
#
#   newLabels ................ The new label string to assign to a matching timer report (required).
#
#   types .................... The report types to apply this rule to. Valid values are: "T" (Transaction), "A" (Action)
#                              and "R" (Request). Multiple type codes can be provided separated by space, comma or
#                              semicolon (e.g. provide "A,R" to apply a rule to Actions and Requests).
#
#   namePattern [n] .......... Regex defining a matching timer report name
#   labelPattern [l] ......... Regex defining a matching label string
#
#   stopOnMatch .............. Whether or not to process the next rule even if the current rule applied (defaults to
#                              "true").
#
# If more than one pattern is given, all given patterns must match for the timer report to be processed.
#
# Note that "newLabels" may contain placeholders, which are replaced with the specified capturing group from the
# respective pattern. The placeholder format is as follows: {<category>:<capturingGroupIndex>}, where <category> is the
# type code of the respective pattern (given in brackets above) and <capturingGroupIndex> denotes the respective
# capturing group in the selected pattern.
#
# You may also use just {<category>} as placeholder. Such placeholders do not require a pattern and are resolved to the
# full text of the respective timer report attribute.
#
# Excluding instead of Including
#
#   com.xceptance.xlt.reportgenerator.labelingRules.<num>.<param>.exclude = <value>
#
# All timer reports that match the exclude pattern will not be selected. For example, to label all transaction reports
# with a name other than "TOrder" with "anonymous", you would set up a rule like this:
#
#   com.xceptance.xlt.reportgenerator.labelingRules.1.newLabels = anonymous
#   com.xceptance.xlt.reportgenerator.labelingRules.1.types = T
#   com.xceptance.xlt.reportgenerator.labelingRules.1.namePattern.exclude = ^TOrder
#
# Please note that an include pattern as well as an exclude pattern can be specified for a pattern type at the same
# time. In this case, a report is selected if and only if it matches the include pattern, but does not match the exclude
# pattern.
#
# Multiple Labels per Timer Report
#
# The label of a timer report is a single string, but for displaying purposes in the HTML report whitespaces in the
# label string are interpreted as delimiters, so space-separated words can be viewed as multiple labels. For example,
# the label string "guest checkout" will be displayed as two labels, "guest" and "checkout", in the report.
#
# Therefor, the placeholder "{l}" can be used to effectively "add" another label instead of overwriting the existing
# one. For example, the following rule will append " order" to the label string of all matching reports, which is
# equivalent to adding a label "order" to the existing labels:
#
#   com.xceptance.xlt.reportgenerator.labelingRules.5.newLabels = {l} order
#   com.xceptance.xlt.reportgenerator.labelingRules.5.types = A,R
#   com.xceptance.xlt.reportgenerator.labelingRules.5.namePattern = ^(PlaceOrder)
#
#######################################################################################################################

### Request/Action Labeling ###

## Homepage
com.xceptance.xlt.reportgenerator.labelingRules.1.newLabels = homepage
com.xceptance.xlt.reportgenerator.labelingRules.1.types = A,R
com.xceptance.xlt.reportgenerator.labelingRules.1.namePattern = ^Homepage

## Catalog
com.xceptance.xlt.reportgenerator.labelingRules.2.newLabels = catalog
com.xceptance.xlt.reportgenerator.labelingRules.2.types = A,R
com.xceptance.xlt.reportgenerator.labelingRules.2.namePattern = ^(SelectTopCategory|SelectCategory|ProductDetailView)

## Cart
com.xceptance.xlt.reportgenerator.labelingRules.3.newLabels = cart
com.xceptance.xlt.reportgenerator.labelingRules.3.types = A,R
com.xceptance.xlt.reportgenerator.labelingRules.3.namePattern = ^(AddToCart|ViewCart)

## Checkout
com.xceptance.xlt.reportgenerator.labelingRules.4.newLabels = checkout
com.xceptance.xlt.reportgenerator.labelingRules.4.types = A,R
com.xceptance.xlt.reportgenerator.labelingRules.4.namePattern = ^(StartCheckout|EnterShippingAddress|EnterBillingAddress|EnterPaymentMethod)

## Order
com.xceptance.xlt.reportgenerator.labelingRules.5.newLabels = order
com.xceptance.xlt.reportgenerator.labelingRules.5.types = A,R
com.xceptance.xlt.reportgenerator.labelingRules.5.namePattern = ^(PlaceOrder)

## Account
com.xceptance.xlt.reportgenerator.labelingRules.6.newLabels = account
com.xceptance.xlt.reportgenerator.labelingRules.6.types = A,R
com.xceptance.xlt.reportgenerator.labelingRules.6.namePattern = ^(Login|Logout|Register|GoToRegistrationForm|GoToSignIn)


### Transaction Labeling ###

## Registered
com.xceptance.xlt.reportgenerator.labelingRules.10.newLabels = registered
com.xceptance.xlt.reportgenerator.labelingRules.10.types = T
com.xceptance.xlt.reportgenerator.labelingRules.10.namePattern = ^TOrder

## Anonymous 
com.xceptance.xlt.reportgenerator.labelingRules.11.newLabels = anonymous
com.xceptance.xlt.reportgenerator.labelingRules.11.types = T
com.xceptance.xlt.reportgenerator.labelingRules.11.namePattern.exclude = ^TOrder

