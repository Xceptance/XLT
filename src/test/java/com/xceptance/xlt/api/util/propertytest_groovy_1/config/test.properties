# Base configuration
totalUsers = 100

TBrowse.users = #{ ${totalUsers} * 4 as int }
TSearch.users = #{ ${totalUsers} * 3 as int }
TOrder.users = #{ ${totalUsers} * 2 as int }
TCheckout.users = #{ ${totalUsers} * 1 as int }

# stacked 
test = ${int.10}
TBrowse2.users = #{ (${int.10} * ${int.1}) as int }
TSearch2.users = #{ ${TBrowse2.users} * ${int.2} as int }
TCheckout2.users = #{ ${TSearch2.users} * ${int.3} as int }
TOrder2.users = #{ ${TCheckout2.users} * ${int.4} as int }

#########################################
# Conditionals — string values must be quoted when pasted via ${}
mode = production
conditional.users = #{ '${mode}' == 'production' ? 100 : 10 }

# String operations — quote ${} to get a Groovy string
env.label = #{ "Environment: " + '${mode}' }

#########################################
totalRequests = 10000
testDurationHours = 1.5

# Calculate arrival rate per hour using ${} substitution
com.xceptance.xlt.loadtests.TSearch.arrivalRate = #{ \
    (${totalRequests} / ${testDurationHours}).intValue() \
}

#########################################
# Doc: "Load Mix Calculation" — using .intValue() for clean integers
mix.TBrowse.users = #{ (${totalUsers} * 0.40).intValue() }
mix.TSearch.users = #{ (${totalUsers} * 0.30).intValue() }
mix.TOrder.users = #{ (${totalUsers} * 0.10).intValue() }
mix.TCheckout.users = #{ (${totalUsers} * 0.20).intValue() }

#########################################
# Doc: "Environment-Based Configuration" — multiplier scaling
load.multiplier = 1.5
base.browse.users = 50
scaled.TBrowse.users = #{ (${base.browse.users} * ${load.multiplier}).intValue() }

#########################################
# Doc: "Supported Operations — Arithmetic" — modulo
modulo.result = #{ (17 % 5) }

#########################################
# Doc: "Supported Operations — Type conversion"  
typed.int = #{ '42' as int }
typed.double = #{ '3.14' as double }
typed.string = #{ 42 as String }
