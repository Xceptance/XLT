# Base configuration
totalUsers = 100

TBrowse.users = #{ ${totalUsers} * 4 as int }
TSearch.users = #{ ${totalUsers} * 3 as int }
TOrder.users = #{ ${totalUsers} * 2 as int }
TCheckout.users = #{ ${totalUsers} * 1 as int }

# stacked 
test = ${int.10}
TBrowse2.users = #{ (${int.10} * ${int.1}) as int }
TSearch2.users = #{ ${TBrowse2.users} * ${int.2} as int }
TCheckout2.users = #{ ${TSearch2.users} * ${int.3} as int }
TOrder2.users = #{ ${TCheckout2.users} * ${int.4} as int }

#########################################
init = #{ \
    ctx['base'] = props['totalUsers'] as int; \
    ctx['loaded'] = true; \
    'initialized' \
}

# Use stored values later
browse.users = #{ (ctx['base'] * 0.4) as int }
order.users = #{ (ctx['base'] * 0.1) as int }

#########################################
# Conditionals
mode = production
users = #{ props['mode'] == 'production' ? 100 : 10 }

# String operations
env.label = #{ "Environment: ${props['mode']}" }

#########################################
totalRequests = 10000
testDurationHours = 1.5

# Calculate arrival rate per hour
com.xceptance.xlt.loadtests.TSearch.arrivalRate = #{ \
    (props['totalRequests'] as int / (props['testDurationHours'] as double)).intValue() \
}

#########################################
totalUsers3 = 100

com.xceptance.xlt.loadtests.config = #{ \
    def total3 = props['totalUsers3'] as int; \
    def browse3 = (total3 * 0.4) as int; \
    def order3 = (total3 * 0.1) as int; \
    \
    ctx['totalUsers3'] = total3; \
    ctx['browseUsers3'] = browse3; \
    ctx['orderUsers3'] = order3; \
    \
    'configured' \
}

com.xceptance.xlt.loadtests.TBrowse.users = #{ ctx['browseUsers3'] }
com.xceptance.xlt.loadtests.TOrder.users = #{ ctx['orderUsers3'] }

#########################################
# Doc: "Load Mix Calculation" — using .intValue() for clean integers
mix.TBrowse.users = #{ (${totalUsers} * 0.40).intValue() }
mix.TSearch.users = #{ (${totalUsers} * 0.30).intValue() }
mix.TOrder.users = #{ (${totalUsers} * 0.10).intValue() }
mix.TCheckout.users = #{ (${totalUsers} * 0.20).intValue() }

#########################################
# Doc: "Environment-Based Configuration" — multiplier scaling
load.multiplier = 1.5
base.browse.users = 50
scaled.TBrowse.users = #{ (${base.browse.users} * ${load.multiplier}).intValue() }

#########################################
# Doc: "Available Bindings / props" — getProperty with default value
orderUsers = #{ props.getProperty('order.users.fallback', '10') as int }

#########################################
# Doc: "Available Bindings / props" — dynamic key lookup
env = production
limit.production = 500
limit.staging = 50
dynamic.limit = #{ props.getProperty("limit.${props['env']}", '100') as int }

#########################################
# Doc: "Error Handling" — invalid syntax is tested programmatically, not from fixture

#########################################
# Doc: "Supported Operations — Conditionals" — ternary operator
conditional.users = #{ props['mode'] == 'production' ? 100 : 10 }

#########################################
# Doc: "Supported Operations — Arithmetic" — modulo
modulo.result = #{ (17 % 5) }

#########################################
# Doc: "Supported Operations — Type conversion"  
typed.int = #{ '42' as int }
typed.double = #{ '3.14' as double }
typed.string = #{ 42 as String }
