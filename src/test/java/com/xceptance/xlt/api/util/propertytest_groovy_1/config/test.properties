# Base configuration
totalUsers = 100

TBrowse.users = #{ ${totalUsers} * 4 as int }
TSearch.users = #{ ${totalUsers} * 3 as int }
TOrder.users = #{ ${totalUsers} * 2 as int }
TCheckout.users = #{ ${totalUsers} * 1 as int }

# stacked 
test = ${int.10}
TBrowse2.users = #{ (${int.10} * ${int.1}) as int }
TSearch2.users = #{ ${TBrowse2.users} * ${int.2} as int }
TCheckout2.users = #{ ${TSearch2.users} * ${int.3} as int }
TOrder2.users = #{ ${TCheckout2.users} * ${int.4} as int }

#########################################
init = #{ \
    ctx['base'] = props['totalUsers'] as int; \
    ctx['loaded'] = true; \
    'initialized' \
}

# Use stored values later
browse.users = #{ (ctx['base'] * 0.4) as int }
order.users = #{ (ctx['base'] * 0.1) as int }

#########################################
# Conditionals
mode = production
users = #{ props['mode'] == 'production' ? 100 : 10 }

# String operations
env.label = #{ "Environment: ${props['mode']}" }

#########################################
totalRequests = 10000
testDurationHours = 1.5

# Calculate arrival rate per hour
com.xceptance.xlt.loadtests.TSearch.arrivalRate = #{ \
    (props['totalRequests'] / props['testDurationHours']) as int \
}

#########################################
